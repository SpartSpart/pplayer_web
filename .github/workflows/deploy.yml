name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # Triggers deployment when pushing to the master branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci
          npm run build
        env:
          # This reads values securely from your GitHub Secrets during compilation
          VITE_FORMSPREE_ID: ${{ secrets.VITE_FORMSPREE_ID }}
          VITE_DESTREAM_URL: ${{ secrets.VITE_DESTREAM_URL }}

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite outputs compilation assets into
          branch: gh-pages # The target branch that holds pages static assets
